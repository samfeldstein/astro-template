  entryTime: 09:30
  exitDate: 2026-04-22
  exitTime: 09:36
  strategy: Lines
  direction: Short
  risk: 10
  pl: 10096.00
  notes: |
    Sort of goofing around, but you can't argue with results? I had my line pattern and entered when price broke between the top two lines. I was trading with fake money, so I took a fairly large position relative to my actual capital. Likely not a trade I would've taken with real money. That said, because my position was so large price did not have to move very far in order to make a really good return.
    
    My risk reward was great no matter what the position size, but only because I kept increasing my position as price moved further into the zone, thus reducing the distance to my stop loss and increasing the distance to minimum profit level.

    Wish I'd done my manual trailing stop thing instead of getting out. Could have made double by now. 

    There was a bunch of support from 1m, but none from 5m or 15m, so figured it wouldn't matter in the near near term, and was right. Suspect that if given enough time price will move all the way to 15m support. Another reason to do manual trailing stop.

    But hey, this was a real trade and I'll take it.

